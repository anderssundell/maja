<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz – Sydkinesiska havet</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap');

        :root {
            --ocean-deep: #0a1628;
            --ocean-mid: #132742;
            --ocean-light: #1e3a5f;
            --accent-gold: #e8b84b;
            --accent-coral: #e85d4a;
            --accent-teal: #2ec4b6;
            --accent-green: #34d399;
            --accent-red: #f87171;
            --text-primary: #f0f0f0;
            --text-secondary: #a0b4c8;
            --card-bg: rgba(19, 39, 66, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--ocean-deep);
            color: var(--text-primary);
            line-height: 1.7;
            min-height: 100vh;
        }

        /* ── NAV ── */
        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 22, 40, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--card-border);
            padding: 0 2rem;
        }

        nav .nav-inner {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 56px;
        }

        nav .logo {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--accent-teal);
            text-decoration: none;
        }

        .back-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link:hover { color: var(--text-primary); }

        /* ── MAIN ── */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 3rem 2rem 5rem;
        }

        .quiz-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .section-label {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--accent-teal);
            margin-bottom: 0.75rem;
        }

        .quiz-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            font-weight: 700;
            margin-bottom: 0.75rem;
        }

        .quiz-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 300;
        }

        /* ── PROGRESS ── */
        .progress-bar-wrap {
            background: rgba(255,255,255,0.06);
            border-radius: 100px;
            height: 8px;
            margin-bottom: 2.5rem;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-teal), var(--accent-gold));
            border-radius: 100px;
            transition: width 0.5s ease;
        }

        .progress-text {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
        }

        /* ── QUESTION ── */
        .question-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 2.5rem;
            margin-bottom: 1.5rem;
            display: none;
        }

        .question-card.active { display: block; }

        .question-number {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--accent-teal);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        .question-text {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .options { display: flex; flex-direction: column; gap: 0.75rem; }

        .option {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.25rem;
            border-radius: 10px;
            border: 1px solid var(--card-border);
            background: rgba(255,255,255,0.02);
            cursor: pointer;
            transition: all 0.25s;
            font-size: 0.92rem;
            color: var(--text-secondary);
        }

        .option:hover:not(.disabled) {
            border-color: rgba(46, 196, 182, 0.3);
            background: rgba(46, 196, 182, 0.05);
            color: var(--text-primary);
        }

        .option .letter {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
            background: rgba(255,255,255,0.05);
            flex-shrink: 0;
            transition: all 0.25s;
        }

        .option.correct {
            border-color: var(--accent-green);
            background: rgba(52, 211, 153, 0.1);
            color: var(--text-primary);
        }

        .option.correct .letter {
            background: var(--accent-green);
            color: var(--ocean-deep);
        }

        .option.wrong {
            border-color: var(--accent-red);
            background: rgba(248, 113, 113, 0.1);
            color: var(--text-primary);
        }

        .option.wrong .letter {
            background: var(--accent-red);
            color: white;
        }

        .option.disabled { pointer-events: none; }
        .option.disabled:not(.correct):not(.wrong) { opacity: 0.4; }

        .explanation {
            margin-top: 1.25rem;
            padding: 1rem 1.25rem;
            border-radius: 10px;
            background: rgba(46, 196, 182, 0.08);
            border: 1px solid rgba(46, 196, 182, 0.15);
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.7;
            display: none;
        }

        .explanation.show { display: block; }

        .explanation a {
            color: var(--accent-teal);
            text-decoration: none;
            font-size: 0.75rem;
        }

        .explanation a:hover { text-decoration: underline; }

        /* ── NEXT BUTTON ── */
        .next-btn {
            display: none;
            margin-top: 1.5rem;
            padding: 0.7rem 2rem;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, var(--accent-teal), #1a9e93);
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .next-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(46, 196, 182, 0.3);
        }

        .next-btn.show { display: inline-block; }

        /* ── RESULTS ── */
        .results {
            display: none;
            text-align: center;
            padding: 3rem;
        }

        .results.active { display: block; }

        .results-score {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-coral));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .results-label {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .results-message {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 2rem;
        }

        .results-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .results-buttons a, .results-buttons button {
            padding: 0.7rem 1.5rem;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-teal), #1a9e93);
            color: white;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--card-border) !important;
            color: var(--text-secondary);
        }

        .results-buttons a:hover, .results-buttons button:hover {
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-inner">
        <a href="index.html" class="logo">Sydkinesiska havet</a>
        <a href="index.html" class="back-link">← Tillbaka till materialet</a>
    </div>
</nav>

<div class="container">
    <div class="quiz-header">
        <div class="section-label">Kunskapstest</div>
        <h1>Quiz: Sydkinesiska havet</h1>
        <p>Tio frågor baserade på det pedagogiska materialet. Välj det bästa svaret!</p>
    </div>

    <div class="progress-text" id="progressText">Fråga 1 av 10</div>
    <div class="progress-bar-wrap">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <!-- FRÅGOR -->
    <div id="quizContainer"></div>

    <!-- RESULTAT -->
    <div class="results" id="results">
        <div class="results-score" id="scoreDisplay"></div>
        <div class="results-label">rätt av 10</div>
        <div class="results-message" id="resultMessage"></div>
        <div class="results-buttons">
            <button class="btn-primary" onclick="restartQuiz()">Gör om quizet</button>
            <a href="index.html" class="btn-secondary">Läs materialet igen</a>
        </div>
    </div>
</div>

<script>
const questions = [
    {
        q: "Ungefär hur stor del av Sydkinesiska havet gör Kina anspråk på?",
        options: ["Cirka 50%", "Cirka 70%", "Cirka 90%", "100%"],
        correct: 2,
        explanation: "Kina gör anspråk på cirka 90 procent av Sydkinesiska havet, baserat på den så kallade Niopunktslinjen.",
        source: "https://www.svt.se/nyheter/utrikes/usa-sydkinesiska-havet-inte-ert-havsimperium",
        sourceLabel: "SVT Nyheter"
    },
    {
        q: "Vad är 'Niopunktslinjen'?",
        options: [
            "En militär försvarslinje i havet",
            "En gränsdragning på kinesiska kartor från 1947",
            "Ett avtal mellan nio länder",
            "En handelsrutt genom Sydkinesiska havet"
        ],
        correct: 1,
        explanation: "Niopunktslinjen är en gränsdragning på kinesiska kartor från 1947 som Kina använder för att motivera sina territoriella anspråk på nästan hela Sydkinesiska havet.",
        source: "https://sverigesradio.se/artikel/spant-lage-i-sydkinesiska-sjon",
        sourceLabel: "Sveriges Radio"
    },
    {
        q: "Vilket år fastslog Haag-domstolen att Kinas anspråk saknar juridisk grund?",
        options: ["2012", "2014", "2016", "2020"],
        correct: 2,
        explanation: "Den Permanenta skiljedomstolen i Haag fastslog i juli 2016 att Kina saknar historisk rätt till Sydkinesiska havet. Kina vägrade erkänna domen.",
        source: "https://www.svt.se/nyheter/utrikes/haagdomstolen-ger-filippinerna-ratt",
        sourceLabel: "SVT Nyheter"
    },
    {
        q: "Hur reagerade Kina på Haag-domstolens dom?",
        options: [
            "Kina accepterade domen motvilligt",
            "Kina drog tillbaka sina anspråk delvis",
            "Kina vägrade erkänna domen",
            "Kina lämnade FN i protest"
        ],
        correct: 2,
        explanation: "Kina förklarade att man 'accepterar inte och erkänner inte Haag-tribunalens domslut' och vägrade delta i förhandlingarna.",
        source: "https://www.svt.se/nyheter/utrikes/haagdomstolen-ger-filippinerna-ratt",
        sourceLabel: "SVT Nyheter"
    },
    {
        q: "Hur stor del av världens sjöfart passerar genom Sydkinesiska havet?",
        options: ["Ungefär en tiondel", "Ungefär en fjärdedel", "Ungefär en tredjedel", "Ungefär hälften"],
        correct: 2,
        explanation: "Ungefär en tredjedel av världens fartygsfrakt passerar genom Sydkinesiska havet, vilket gör det till en av världens viktigaste sjöfartsleder.",
        source: "https://www.svt.se/nyheter/utrikes/en-maktkamp-mellan-kina-och-usa",
        sourceLabel: "SVT Nyheter"
    },
    {
        q: "Vad har Kina byggt på korallrev i Sydkinesiska havet?",
        options: [
            "Forskningsstationer",
            "Konstgjorda öar med militäranläggningar",
            "Turistanläggningar",
            "Oljeplattformar"
        ],
        correct: 1,
        explanation: "Kina har byggt konstgjorda öar på korallrev och installerat militär infrastruktur – flygfält, radar och luftvärnsrobotar – för att stärka sina anspråk.",
        source: "https://www.svt.se/nyheter/utrikes/en-maktkamp-mellan-kina-och-usa",
        sourceLabel: "SVT Nyheter"
    },
    {
        q: "Vilket vapen använder kinesisk kustbevakning mot filippinska fiskebåtar?",
        options: [
            "Varningsskott med kulvapen",
            "Tårgas",
            "Vattenkanoner",
            "Ljudkanoner"
        ],
        correct: 2,
        explanation: "Kinesisk kustbevakning riktar vattenkanoner mot filippinska fiskebåtar – de gamla träbåtarna riskerar att sjunka. Båtar bordas också och fiskare hotas med vapen.",
        source: "https://www.svt.se/nyheter/utrikes/allt-fler-fiskare-i-filippinerna-angrips-av-kinas-kustbevakning",
        sourceLabel: "SVT Nyheter, 2026"
    },
    {
        q: "Vad menar USA med principen om 'havens frihet'?",
        options: [
            "Att alla havsdjur ska vara skyddade",
            "Att internationella vatten ska vara öppna för alla länders sjöfart",
            "Att USA har rätt att kontrollera alla hav",
            "Att fiske ska vara fritt för alla"
        ],
        correct: 1,
        explanation: "USA hävdar att internationella vatten ska vara öppna för alla länders sjöfart. Kina ser detta som ett försök att inkräkta på kinesisk suveränitet.",
        source: "https://www.svt.se/nyheter/utrikes/en-maktkamp-mellan-kina-och-usa",
        sourceLabel: "SVT Nyheter"
    },
    {
        q: "Hur nära varandra kom amerikanska och kinesiska krigsfartyg i en incident 2018?",
        options: ["500 meter", "200 meter", "40 meter", "2 kilometer"],
        correct: 2,
        explanation: "Amerikanska USS Decatur och kinesiska jagaren Luyang var bara cirka 40 meter från kollision nära Spratlyöarna – en extremt farlig situation.",
        source: "https://www.svt.se/nyheter/utrikes/det-mullrar-pa-det-sydkinesiska-havet",
        sourceLabel: "SVT Nyheter"
    },
    {
        q: "Varför är Haag-domstolens dom från 2016 svår att genomdriva?",
        options: [
            "Domen var inte enhällig",
            "Domstolen saknar verkställighetsmakt",
            "Filippinerna drog tillbaka sin talan",
            "Domen gäller bara i fem år"
        ],
        correct: 1,
        explanation: "Även om domen är juridiskt bindande enligt FN:s havsrättskonvention saknar domstolen verkställighetsmakt – det finns ingen mekanism för att tvinga Kina att följa den. 'Om Kina kan strunta i havsrätten finns inget som hindrar andra länder att följa efter.'",
        source: "https://www.sverigesradio.se/artikel/det-star-pa-spel-i-sydkinesiska-havet",
        sourceLabel: "Sveriges Radio"
    }
];

let currentQ = 0;
let score = 0;

function buildQuiz() {
    const container = document.getElementById('quizContainer');
    container.innerHTML = '';
    questions.forEach((q, i) => {
        const letters = ['A', 'B', 'C', 'D'];
        let optionsHTML = q.options.map((opt, j) =>
            `<div class="option" data-index="${j}" onclick="answer(${i}, ${j})">
                <span class="letter">${letters[j]}</span>
                <span>${opt}</span>
            </div>`
        ).join('');

        container.innerHTML += `
            <div class="question-card" id="q${i}" ${i === 0 ? 'class="question-card active"' : ''}>
                <div class="question-number">Fråga ${i + 1} av 10</div>
                <div class="question-text">${q.q}</div>
                <div class="options">${optionsHTML}</div>
                <div class="explanation" id="exp${i}">
                    ${q.explanation}
                    <br><a href="${q.source}" target="_blank">Källa: ${q.sourceLabel} →</a>
                </div>
                <button class="next-btn" id="next${i}" onclick="nextQuestion(${i})">
                    ${i < questions.length - 1 ? 'Nästa fråga →' : 'Se resultat →'}
                </button>
            </div>
        `;
    });
    // Ensure first card is active
    document.getElementById('q0').classList.add('active');
}

function answer(qIndex, optIndex) {
    const card = document.getElementById(`q${qIndex}`);
    const options = card.querySelectorAll('.option');
    const q = questions[qIndex];

    options.forEach(opt => opt.classList.add('disabled'));

    if (optIndex === q.correct) {
        options[optIndex].classList.add('correct');
        score++;
    } else {
        options[optIndex].classList.add('wrong');
        options[q.correct].classList.add('correct');
    }

    document.getElementById(`exp${qIndex}`).classList.add('show');
    document.getElementById(`next${qIndex}`).classList.add('show');
}

function nextQuestion(current) {
    document.getElementById(`q${current}`).classList.remove('active');

    if (current + 1 < questions.length) {
        currentQ = current + 1;
        document.getElementById(`q${currentQ}`).classList.add('active');
        document.getElementById('progressText').textContent = `Fråga ${currentQ + 1} av 10`;
        document.getElementById('progressBar').style.width = `${((currentQ) / questions.length) * 100}%`;
    } else {
        showResults();
    }
}

function showResults() {
    document.getElementById('progressText').style.display = 'none';
    document.querySelector('.progress-bar-wrap').style.display = 'none';
    document.getElementById('progressBar').style.width = '100%';

    const results = document.getElementById('results');
    results.classList.add('active');
    document.getElementById('scoreDisplay').textContent = score;

    let msg;
    if (score <= 3) msg = "Det finns mer att lära! Läs materialet igen och försök sedan.";
    else if (score <= 6) msg = "Bra försök! Du har koll på grunderna.";
    else if (score <= 8) msg = "Starkt! Du har god koll på konflikten.";
    else if (score === 9) msg = "Imponerande! Nästan fullt!";
    else msg = "Perfekt resultat! Du är expert på Sydkinesiska havet!";

    document.getElementById('resultMessage').textContent = msg;
}

function restartQuiz() {
    score = 0;
    currentQ = 0;
    document.getElementById('results').classList.remove('active');
    document.getElementById('progressText').style.display = 'block';
    document.getElementById('progressText').textContent = 'Fråga 1 av 10';
    document.querySelector('.progress-bar-wrap').style.display = 'block';
    document.getElementById('progressBar').style.width = '0%';
    buildQuiz();
}

buildQuiz();
</script>

</body>
</html>
